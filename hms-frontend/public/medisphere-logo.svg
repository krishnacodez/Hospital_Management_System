<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="MediSphere">
  <defs>
    <linearGradient id="ms-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0052CC"/>
      <stop offset="100%" stop-color="#00C2FF"/>
    </linearGradient>
    <linearGradient id="ms-green" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00A859"/>
      <stop offset="100%" stop-color="#32CD32"/>
    </linearGradient>
    <linearGradient id="ms-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0052CC"/>
      <stop offset="45%" stop-color="#00A3E0"/>
      <stop offset="55%" stop-color="#00A859"/>
      <stop offset="100%" stop-color="#32CD32"/>
    </linearGradient>
    <filter id="ms-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="60" cy="60" r="54" fill="url(#ms-blue)" opacity="0.15"/>
  <ellipse cx="48" cy="52" rx="38" ry="42" fill="url(#ms-blue)" opacity="0.85" transform="rotate(-18 48 52)"/>
  <ellipse cx="72" cy="68" rx="36" ry="40" fill="url(#ms-green)" opacity="0.9" transform="rotate(22 72 68)"/>
  <ellipse cx="60" cy="44" rx="32" ry="28" fill="url(#ms-blue)" opacity="0.55" transform="rotate(8 60 44)"/>
  <rect x="52" y="44" width="16" height="32" rx="3" fill="#fff"/>
  <rect x="44" y="52" width="32" height="16" rx="3" fill="#fff"/>
  <circle cx="38" cy="38" r="4" fill="#fff" opacity="0.7"/>
</svg>
